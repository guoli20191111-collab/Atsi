<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATSI · 奔赴人生另一个分支</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --indigo: #6366F1;
    --lilac: #A855F7;
    --text: #1a1130;
    --text-soft: rgba(26, 17, 48, 0.68);
    --text-dim: rgba(26, 17, 48, 0.4);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 6vw;
    background: var(--bg);
    overflow: hidden;
  }

  /* 烟雾感色块：极高模糊度，纯白底上隐约透出 */
  .blob {
    position: absolute;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    filter: blur(140px);
    -webkit-filter: blur(140px);
  }
  .blob-purple {
    top: 8%;
    left: -8%;
    width: 55vw;
    height: 55vw;
    max-width: 680px;
    max-height: 680px;
    background: rgba(99, 102, 241, 0.28);
    animation: drift-1 14s ease-in-out infinite;
  }
  .blob-pink {
    bottom: 5%;
    right: -10%;
    width: 55vw;
    height: 55vw;
    max-width: 680px;
    max-height: 680px;
    background: rgba(168, 85, 247, 0.28);
    animation: drift-2 16s ease-in-out infinite;
  }
  @keyframes drift-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, 20px) scale(1.08); }
  }
  @keyframes drift-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, -25px) scale(1.06); }
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1040px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(36px, 6vh, 64px);
  }

  .logo {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
    font-size: clamp(13px, 1.3vw, 15px);
    letter-spacing: 0.55em;
    font-weight: 500;
    background: linear-gradient(135deg, var(--indigo) 0%, var(--lilac) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    padding-left: 0.55em;
    opacity: 0.85;
  }

  .title-main {
    font-size: clamp(32px, 5.4vw, 68px);
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.3;
    color: var(--text);
  }
  .title-main .accent {
    background: linear-gradient(135deg, var(--indigo) 0%, var(--lilac) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* 粒子汇聚 — "去见见，" */
  .line-wrap {
    position: relative;
    display: inline-block;
  }
  .particle-stage {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .particle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--indigo), var(--lilac));
    box-shadow:
      0 0 8px rgba(168, 85, 247, 0.85),
      0 0 16px rgba(99, 102, 241, 0.55);
    transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(0.4);
    opacity: 0;
    animation: particle-converge var(--dur) cubic-bezier(0.4, 0, 0.2, 1) var(--delay) forwards;
  }
  @keyframes particle-converge {
    0% {
      transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(0.4);
      opacity: 0;
    }
    25% { opacity: 1; }
    85% { opacity: 1; }
    100% {
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }
  }
  .line-1 {
    position: relative;
    display: inline-block;
    font-size: 1.45em;
    font-weight: 700;
    letter-spacing: 0.06em;
    opacity: 0;
    filter: blur(14px);
    animation: line-converge 1s cubic-bezier(0.2, 0.8, 0.2, 1) 1.2s forwards;
    z-index: 2;
  }
  .line-2 {
    position: relative;
    display: inline-block;
    opacity: 0;
    filter: blur(14px);
    animation: line-converge 1s cubic-bezier(0.2, 0.8, 0.2, 1) 1.55s forwards;
    z-index: 2;
  }
  @keyframes line-converge {
    to { opacity: 1; filter: blur(0); }
  }

  /* 发光小点 */
  .dot-divider {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--indigo), var(--lilac));
    box-shadow:
      0 0 12px rgba(168, 85, 247, 0.7),
      0 0 28px rgba(99, 102, 241, 0.45);
    margin: 8px 0;
    opacity: 0;
    transform: scale(0.4);
    animation:
      dot-emerge 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 2.7s forwards,
      dot-pulse 2.6s ease-in-out 3.6s infinite;
  }
  @keyframes dot-emerge {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes dot-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  .subtitle {
    font-size: clamp(14px, 1.55vw, 17px);
    color: var(--text-soft);
    line-height: 1.75;
    letter-spacing: 0.06em;
    font-weight: 400;
    max-width: 560px;
  }

  .divider {
    width: 1px;
    height: 32px;
    background: linear-gradient(to bottom, transparent, rgba(157, 108, 255, 0.55), transparent);
    margin: 4px 0;
  }

  .title-secondary {
    font-size: clamp(17px, 2.2vw, 22px);
    color: var(--purple-deep);
    letter-spacing: 0.1em;
    font-weight: 500;
    line-height: 1.6;
  }

  .cta {
    margin-top: 14px;
    padding: 17px 52px;
    background: linear-gradient(135deg, var(--indigo) 0%, var(--lilac) 100%);
    border: none;
    border-radius: 100px;
    color: white;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.18em;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow:
      0 10px 30px rgba(99, 102, 241, 0.3),
      0 4px 12px rgba(168, 85, 247, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.25);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px);
    animation: cta-emerge 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 3.0s forwards;
  }
  @keyframes cta-emerge {
    to { opacity: 1; transform: translateY(0); }
  }
  .cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .cta:hover {
    transform: translateY(-2px);
    box-shadow:
      0 14px 38px rgba(99, 102, 241, 0.42),
      0 6px 16px rgba(168, 85, 247, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
  .cta:hover::before { opacity: 1; }
  .cta:active { transform: translateY(0); }

  .footer-hint {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.35em;
    z-index: 2;
    font-family: "SF Mono", "JetBrains Mono", monospace;
  }

  @media (max-width: 600px) {
    .hero { padding: 4vh 5vw; }
    .content { gap: 28px; }
    .logo { top: 20px; letter-spacing: 0.4em; font-size: 11px; }
    .title-main { font-size: clamp(22px, 6vw, 32px); letter-spacing: 0.02em; line-height: 1.4; }
    .cta { padding: 15px 40px; font-size: 14px; letter-spacing: 0.15em; }
    .footer-hint { font-size: 10px; letter-spacing: 0.25em; bottom: 16px; }
  }
</style>
</head>
<body>
<main class="hero">
  <div class="blob blob-purple"></div>
  <div class="blob blob-pink"></div>

  <div class="logo">ATSI</div>

  <div class="content">
    <h1 class="title-main"><span class="line-wrap"><span class="particle-stage" id="particles"></span><span class="line-1">去见见</span><br><span class="line-2 accent">那个选了另一条路的你</span></span></h1>

    <div class="dot-divider"></div>

    <button class="cta" onclick="location.href='quiz.html'">开启穿越时空</button>
  </div>

  <div class="footer-hint">A · T · S · I &nbsp;·&nbsp; PARALLEL TIMELINE</div>
</main>
<script>
  (function () {
    const stage = document.getElementById('particles');
    if (!stage) return;
    const N = 48;
    for (let i = 0; i < N; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = Math.random() * Math.PI * 2;
      const dist = 130 + Math.random() * 280;
      const sx = Math.cos(angle) * dist;
      const sy = Math.sin(angle) * dist * 0.75;
      p.style.setProperty('--sx', sx.toFixed(1) + 'px');
      p.style.setProperty('--sy', sy.toFixed(1) + 'px');
      p.style.setProperty('--delay', (Math.random() * 0.6).toFixed(2) + 's');
      p.style.setProperty('--dur', (1.4 + Math.random() * 0.7).toFixed(2) + 's');
      stage.appendChild(p);
    }
  })();
</script>
</body>
</html>
