<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时空坐标 · ATSI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --indigo: #6366F1;
    --lilac: #A855F7;
    --text: #1a1130;
    --text-soft: rgba(26, 17, 48, 0.72);
    --text-mid: rgba(26, 17, 48, 0.55);
    --text-dim: rgba(26, 17, 48, 0.4);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-border: rgba(99, 102, 241, 0.16);
    --line: rgba(99, 102, 241, 0.1);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }

  /* 烟雾色块 */
  .blob {
    position: absolute;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    filter: blur(140px);
  }
  .blob-1 { top: 0; left: -8%; width: 55vw; height: 55vw; max-width: 720px; max-height: 720px; background: rgba(99, 102, 241, 0.22); }
  .blob-2 { top: 30%; right: -10%; width: 55vw; height: 55vw; max-width: 720px; max-height: 720px; background: rgba(168, 85, 247, 0.22); }
  .blob-3 { bottom: -10%; left: 30%; width: 45vw; height: 45vw; max-width: 600px; background: rgba(196, 168, 255, 0.18); }

  /* LOGO */
  .logo {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
    font-size: clamp(13px, 1.3vw, 15px);
    letter-spacing: 0.55em;
    font-weight: 500;
    background: linear-gradient(135deg, var(--indigo) 0%, var(--lilac) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    padding-left: 0.55em;
    opacity: 0.85;
    text-decoration: none;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 920px;
    margin: 0 auto;
    padding: 70px 24px 80px;
  }

  /* Hero 双栏：左卡片信息 / 右信息栏 */
  .hero-card {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: clamp(20px, 3.5vw, 28px);
    margin-bottom: clamp(36px, 6vw, 56px);
  }

  .panel {
    position: relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: clamp(22px, 3vw, 34px);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    box-shadow:
      0 12px 48px rgba(99, 102, 241, 0.08),
      0 4px 16px rgba(168, 85, 247, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.7);
    display: flex;
    flex-direction: column;
  }

  .panel-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--indigo);
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-weight: 600;
    background: rgba(99, 102, 241, 0.08);
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .panel-tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--indigo), var(--lilac));
    box-shadow: 0 0 6px rgba(168, 85, 247, 0.5);
  }

  /* 图片占位（卡片信息上方） */
  .card-image {
    position: relative;
    aspect-ratio: 16 / 9;
    border-radius: 16px;
    overflow: hidden;
    background:
      radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.22) 0%, transparent 55%),
      radial-gradient(circle at 70% 70%, rgba(168, 85, 247, 0.22) 0%, transparent 55%),
      linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(168, 85, 247, 0.08));
    border: 1px dashed rgba(99, 102, 241, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 22px;
  }
  .card-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, transparent 60%);
    filter: blur(20px);
  }
  .img-placeholder {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--indigo);
    text-align: center;
  }
  .img-placeholder svg { opacity: 0.5; }
  .ph-label {
    font-size: 11px;
    letter-spacing: 0.32em;
    font-weight: 600;
    font-family: "SF Mono", "JetBrains Mono", monospace;
    color: rgba(99, 102, 241, 0.7);
  }
  .ph-sub {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    font-family: "SF Mono", "JetBrains Mono", monospace;
  }

  /* 字段（key-value） */
  .field {
    padding: 14px 0;
    border-bottom: 1px dashed var(--line);
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 16px;
    align-items: baseline;
  }
  .field:last-child { border-bottom: none; }
  .field-key {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    font-family: "SF Mono", "JetBrains Mono", monospace;
    text-transform: uppercase;
    padding-top: 4px;
  }
  .field-val {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    letter-spacing: 0.03em;
  }
  .field-val.persona-name {
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.15;
    background: linear-gradient(135deg, var(--indigo) 0%, var(--lilac) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .field-val.atsi-mono {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: clamp(15px, 1.7vw, 18px);
    letter-spacing: 0.32em;
    font-weight: 600;
    color: var(--indigo);
  }
  .field-val.slogan-text {
    font-size: clamp(14px, 1.55vw, 16px);
    font-weight: 500;
    color: var(--text-soft);
    font-style: italic;
    line-height: 1.7;
  }

  /* 右侧信息栏的匹配度展示 */
  .match-block {
    margin: 14px 0 6px;
    padding: 18px 20px;
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(168, 85, 247, 0.06));
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .match-pct {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    background: linear-gradient(135deg, var(--indigo), var(--lilac));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
    display: flex;
    align-items: baseline;
    line-height: 1;
  }
  .match-pct .num { font-size: clamp(36px, 5vw, 56px); }
  .match-pct .unit { font-size: clamp(14px, 1.6vw, 20px); margin-left: 2px; }
  .match-divider { width: 1px; height: 40px; background: var(--line); }
  .match-text {
    font-size: 12px;
    color: var(--text);
    font-family: "SF Mono", "JetBrains Mono", monospace;
    letter-spacing: 0.18em;
    font-weight: 600;
  }

  /* 通用 section */
  .section {
    margin-bottom: clamp(36px, 5vw, 56px);
  }
  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    font-family: "SF Mono", "JetBrains Mono", monospace;
    margin-bottom: 22px;
  }
  .section-label::before {
    content: '';
    width: 18px;
    height: 1px;
    background: linear-gradient(to right, var(--indigo), var(--lilac));
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--line), transparent);
  }
  .section-title {
    font-size: clamp(20px, 2.4vw, 26px);
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 22px;
    color: var(--text);
  }

  /* 解读三段 */
  .interpretation {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .interp-para {
    font-size: clamp(14px, 1.55vw, 16px);
    line-height: 1.95;
    letter-spacing: 0.03em;
    color: var(--text-soft);
    padding: 22px 26px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    position: relative;
  }
  .interp-para::before {
    content: '';
    position: absolute;
    left: 0; top: 26px; bottom: 26px;
    width: 3px;
    background: linear-gradient(to bottom, var(--indigo), var(--lilac));
    border-radius: 100px;
  }

  /* 维度评分表 */
  .scores {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .score-row {
    display: grid;
    grid-template-columns: 60px 1fr 80px 60px;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(255, 255, 255, 0.45);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.25s ease;
  }
  .score-row:hover {
    background: rgba(255, 255, 255, 0.7);
    border-color: rgba(99, 102, 241, 0.3);
    transform: translateY(-1px);
  }
  .score-code {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--indigo);
    background: rgba(99, 102, 241, 0.08);
    padding: 4px 8px;
    border-radius: 6px;
    text-align: center;
  }
  .score-name {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .score-name .desc {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-mid);
    line-height: 1.6;
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .score-dots {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
  }
  .score-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(99, 102, 241, 0.12);
  }
  .score-dot.on {
    background: linear-gradient(135deg, var(--indigo), var(--lilac));
    box-shadow: 0 0 6px rgba(168, 85, 247, 0.5);
  }
  .score-level {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-align: right;
    color: var(--text-mid);
  }
  .score-level.H { color: var(--lilac); }

  /* 友情提示 */
  .tip-card {
    padding: 22px 26px;
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.07), rgba(168, 85, 247, 0.07));
    border: 1px dashed var(--glass-border);
    border-radius: 14px;
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.85;
    letter-spacing: 0.04em;
  }

  /* 作者的话 */
  .author-card {
    padding: 26px 28px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    font-size: 13px;
    color: var(--text-soft);
    line-height: 2;
    letter-spacing: 0.03em;
  }
  .author-card p { margin-bottom: 12px; }
  .author-card p:last-child { margin-bottom: 0; }

  /* 底部按钮 */
  .actions {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: clamp(24px, 4vw, 36px);
  }
  .action-btn {
    padding: 16px 12px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    text-decoration: none;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .action-btn:hover {
    background: rgba(255, 255, 255, 0.85);
    border-color: var(--indigo);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
  }
  .action-btn.primary {
    background: linear-gradient(135deg, var(--indigo), var(--lilac));
    color: white;
    border-color: transparent;
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
  }
  .action-btn.primary:hover {
    box-shadow: 0 12px 32px rgba(99, 102, 241, 0.42);
  }

  /* 入场动画 */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  .fade-in:nth-child(1) { animation-delay: 0.1s; }
  .fade-in:nth-child(2) { animation-delay: 0.25s; }
  .fade-in:nth-child(3) { animation-delay: 0.4s; }
  .fade-in:nth-child(4) { animation-delay: 0.55s; }
  .fade-in:nth-child(5) { animation-delay: 0.7s; }
  .fade-in:nth-child(6) { animation-delay: 0.85s; }
  .fade-in:nth-child(7) { animation-delay: 1s; }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .container { padding: 60px 16px 60px; }
    .hero-card { grid-template-columns: 1fr; gap: 16px; }
    .panel { padding: 20px; }
    .field { grid-template-columns: 80px 1fr; gap: 12px; }
    .field-val.persona-name { font-size: clamp(28px, 8vw, 38px); }
    .match-block { padding: 14px 16px; gap: 12px; }
    .match-pct .num { font-size: 32px; }
    .score-row { grid-template-columns: 50px 1fr 70px 40px; gap: 10px; padding: 12px 14px; }
    .score-dot { width: 8px; height: 8px; }
    .actions { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

  // ============== 匹配逻辑 ==============
  function pickPersona() {
    const counts = [0, 0, 0, 0]; // 0=躺平 1=自律 2=外向 3=随性
    try {
      const raw = localStorage.getItem('atsi_answers');
      if (raw) {
        const data = JSON.parse(raw);
        (data.answers || []).forEach(a => {
          if (typeof a.style === 'number') counts[a.style]++;
        });
      }
    } catch (e) {}
    const total = counts.reduce((a, b) => a + b, 0) || 1;

    // 临时方案：按 4 风格主导匹配
    const dominant = counts.indexOf(Math.max(...counts));
    const styleNames = ['躺平', '自律', '外向', '随性'];

    if (dominant === 0) {
      // 躺平 → 随机选一个：随缘派 / 慢三拍 / 闷声老登
      const t0 = [PERSONAS.flow, PERSONAS.slow, PERSONAS.mute];
      return t0[Math.floor(Math.random() * t0.length)];
    }
    if (dominant === 1) {
      // 自律 → 卷王 / 死磕侠 / 收纳精 / 稳如老狗
      const t1 = [PERSONAS.push, PERSONAS.grit, PERSONAS.sort, PERSONAS.rock];
      return t1[Math.floor(Math.random() * t1.length)];
    }
    if (dominant === 2) {
      // 外向 → 追光怪 / 社牛本牛
      const t2 = [PERSONAS.burn, PERSONAS.buzz];
      return t2[Math.floor(Math.random() * t2.length)];
    }
    // 默认（随性）：读心小狗 / 慢三拍 / 新鲜咖 / 话留半截 / 抗造选手 / 拆题狂 / 清醒人 / 删除狂魔 / 碎了重织 / 归序者 / 渡己者
    const t3 = [PERSONAS.read, PERSONAS.slow, PERSONAS.dare, PERSONAS.gaps, PERSONAS.flex, PERSONAS.solv, PERSONAS.wake, PERSONAS.drop, PERSONAS.knit, PERSONAS.guixu, PERSONAS.duji];
    return t3[Math.floor(Math.random() * t3.length)];
  }

            ).join('');
            return `
              <div class="score-row">
                <span class="score-code">${code}</span>
                <span class="score-name">${name}<span class="desc">${desc}</span></span>
                <span class="score-dots">${dots}</span>
                <span class="score-level ${level}">${level}/${score}</span>
              </div>`;
          }).join('')}
        </div>
      </section>

      <!-- 4. 友情提示 -->
      <section class="section fade-in">
        <div class="section-label">REMINDER · 友情提示</div>
        <div class="tip-card">${TIP}</div>
      </section>

      <!-- 5. 作者的话 -->
      <section class="section fade-in">
        <div class="section-label">AUTHOR · 作者的话</div>
        <div class="author-card">
          ${AUTHOR_NOTE.map(t => `<p>${t}</p>`).join('')}
        </div>
      </section>

      <!-- 6. 底部按钮 -->
      <section class="actions fade-in">
        <button class="action-btn primary" onclick="location.href='quiz.html'">重新测试</button>
        <button class="action-btn" onclick="location.href='index.html'">回到首页</button>
        <button class="action-btn" onclick="onSnapshot()">保存截图</button>
        <button class="action-btn" onclick="onShare()">分享给朋友</button>
      </section>
    `;
    $c.innerHTML = html;
  }

  function onSnapshot() {
    alert('截图功能开发中…\n暂时可以用截屏快捷键：\nMac: Shift+Cmd+4\nWindows: Win+Shift+S');
  }
  function onShare() {
    const url = location.origin + location.pathname.replace('result.html', 'index.html');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => {
        alert('链接已复制到剪贴板，去和朋友一起穿越吧～');
      }, () => alert(url));
    } else {
      alert(url);
    }
  }

  render();
</script>
</body>
</html>
